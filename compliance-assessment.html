<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Compliance Assessment — ROSÉ Partnership</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --rose:       #CC3562;
      --rose-light: #E05080;
      --rose-dark:  #8B1030;
      --gold:       #C9A96E;
      --ink:        #040104;
      --ink-2:      #0A0208;
      --ink-3:      #12050D;
      --text:       #EDE8E3;
      --muted:      #9A8A90;
      --border:     rgba(204,53,98,0.2);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--ink);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.7rem 3rem;
      background: rgba(4,1,4,0.97);
      border-bottom: 1px solid var(--border);
    }
    .nav-home {
      font-family: 'Cinzel', serif; font-size: 1.1rem;
      letter-spacing: 0.35em; color: var(--rose-light);
      text-decoration: none;
    }
    .nav-home:hover { color: var(--text); }
    .nav-back {
      font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--muted); text-decoration: none;
      border: 1px solid var(--rose-dark); padding: 0.4rem 1.2rem;
      transition: background 0.3s, color 0.3s;
    }
    .nav-back:hover { background: var(--rose-dark); color: var(--text); }

    /* MAIN */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 9rem 2rem 6rem;
    }

    /* HEADER */
    .assess-eyebrow {
      font-family: 'Cinzel', serif; font-size: 0.66rem;
      letter-spacing: 0.5em; color: var(--gold);
      text-transform: uppercase; margin-bottom: 1.2rem;
    }
    .assess-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 300; line-height: 1.15; color: var(--text);
      margin-bottom: 1rem;
    }
    .assess-title em { font-style: italic; color: var(--rose-light); }
    .assess-intro {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; font-style: italic;
      line-height: 1.85; color: var(--muted);
      margin-bottom: 3rem; max-width: 680px;
    }

    /* MODE SELECTOR */
    .mode-selector {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1.5px; background: var(--border);
      margin-bottom: 3rem;
    }
    .mode-btn {
      background: var(--ink-2);
      border: none; cursor: pointer;
      padding: 2rem 2rem 1.8rem;
      text-align: left;
      transition: background 0.3s;
      position: relative;
    }
    .mode-btn:hover { background: var(--ink-3); }
    .mode-btn.active { background: rgba(204,53,98,0.08); }
    .mode-btn.active::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(to right, var(--rose), var(--gold));
    }
    .mode-btn-label {
      font-family: 'Cinzel', serif; font-size: 0.6rem;
      letter-spacing: 0.4em; color: var(--gold);
      text-transform: uppercase; margin-bottom: 0.6rem;
      display: block;
    }
    .mode-btn.active .mode-btn-label { color: var(--rose-light); }
    .mode-btn-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem; font-weight: 300; color: var(--text);
      display: block; margin-bottom: 0.5rem;
    }
    .mode-btn-desc {
      font-size: 0.8rem; line-height: 1.7; color: var(--muted);
      display: block;
    }
    .mode-btn-time {
      font-size: 0.68rem; color: var(--rose-dark);
      letter-spacing: 0.15em; text-transform: uppercase;
      display: block; margin-top: 0.8rem;
    }

    /* ASSESSMENT WRAPPER */
    .assessment-wrap { display: none; }
    .assessment-wrap.active { display: block; }

    /* PROGRESS */
    .progress-bar {
      height: 2px; background: var(--border);
      margin-bottom: 2.5rem; position: relative;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(to right, var(--rose-dark), var(--rose));
      transition: width 0.4s ease;
    }
    .progress-label {
      font-size: 0.68rem; letter-spacing: 0.2em;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    /* QUESTION */
    .question-block { display: none; }
    .question-block.active { display: block; }
    .q-section {
      font-family: 'Cinzel', serif; font-size: 0.6rem;
      letter-spacing: 0.4em; color: var(--gold);
      text-transform: uppercase; margin-bottom: 0.8rem;
    }
    .q-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.2rem, 2.5vw, 1.65rem);
      font-weight: 300; line-height: 1.4; color: var(--text);
      margin-bottom: 0.5rem;
    }
    .q-sub {
      font-size: 0.82rem; color: var(--muted);
      line-height: 1.7; margin-bottom: 2rem;
    }
    .q-options { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 2.5rem; }
    .q-option {
      display: flex; align-items: flex-start; gap: 1rem;
      padding: 1.2rem 1.4rem;
      border: 1px solid var(--border);
      cursor: pointer; transition: border-color 0.3s, background 0.3s;
      background: var(--ink-2);
    }
    .q-option:hover { border-color: var(--rose); background: rgba(204,53,98,0.04); }
    .q-option.selected { border-color: var(--rose); background: rgba(204,53,98,0.08); }
    .q-option.selected .q-radio { background: var(--rose); border-color: var(--rose); }
    .q-radio {
      width: 16px; height: 16px; border: 1px solid var(--border);
      border-radius: 50%; flex-shrink: 0; margin-top: 2px;
      transition: background 0.2s, border-color 0.2s;
    }
    .q-option-text { font-size: 0.88rem; line-height: 1.6; color: var(--text); }
    .q-option-sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }

    /* NAV BUTTONS */
    .q-nav { display: flex; gap: 1rem; align-items: center; }
    .btn-next {
      background: linear-gradient(135deg, var(--rose-dark), var(--rose));
      color: var(--text); border: none; padding: 0.85rem 2.2rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
      letter-spacing: 0.18em; text-transform: uppercase;
      cursor: pointer; transition: opacity 0.3s;
    }
    .btn-next:hover { opacity: 0.85; }
    .btn-next:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-prev {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border); padding: 0.85rem 2rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; transition: border-color 0.3s, color 0.3s;
    }
    .btn-prev:hover { border-color: var(--rose); color: var(--rose-light); }

    /* RESULTS */
    .results-block { display: none; }
    .results-block.active { display: block; }
    .result-score-wrap {
      text-align: center; padding: 3rem;
      border: 1px solid var(--border);
      background: rgba(204,53,98,0.04);
      margin-bottom: 2.5rem;
    }
    .result-score {
      font-family: 'Cormorant Garamond', serif;
      font-size: 5rem; font-weight: 300;
      line-height: 1; margin-bottom: 0.5rem;
    }
    .result-tier {
      font-family: 'Cinzel', serif; font-size: 0.72rem;
      letter-spacing: 0.4em; text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .result-summary {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem; font-style: italic;
      line-height: 1.75; color: var(--muted);
      max-width: 600px; margin: 0 auto;
    }
    .result-findings { margin-bottom: 2.5rem; }
    .finding {
      display: flex; gap: 1rem; padding: 1.2rem 1.4rem;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
    }
    .finding:last-child { border-bottom: none; }
    .finding-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .finding h4 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem; font-weight: 400; color: var(--text);
      margin-bottom: 0.3rem;
    }
    .finding p { font-size: 0.82rem; line-height: 1.7; color: var(--muted); }
    .result-actions {
      display: flex; gap: 1rem; flex-wrap: wrap;
      justify-content: center; margin-top: 2.5rem;
    }
    .btn-home {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border); padding: 0.85rem 2rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; text-decoration: none; display: inline-block;
      transition: border-color 0.3s, color 0.3s;
    }
    .btn-home:hover { border-color: var(--gold); color: var(--gold); }

    /* DIVIDER */
    .ornament {
      text-align: center; padding: 1.5rem 0;
      color: var(--rose-dark); font-size: 0.9rem;
      letter-spacing: 0.8em; opacity: 0.4;
    }

    @media (max-width: 600px) {
      nav { padding: 0.7rem 1.2rem; }
      main { padding: 7rem 1.2rem 4rem; }
      .mode-selector { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-home">ROSÉ</a>
  <a href="index.html" class="nav-back">← Back to Home</a>
</nav>

<main>
  <p class="assess-eyebrow">AI Governance · ROSÉ Partnership</p>
  <h1 class="assess-title">Compliance<br><em>Readiness Assessment</em></h1>
  <p class="assess-intro">Understand your organisation's current posture against the EU AI Act, ISO 42001, and emerging AI governance requirements. Choose the assessment that fits your available time.</p>

  <!-- MODE SELECTOR -->
  <div class="mode-selector" id="mode-selector">
    <button class="mode-btn" onclick="startAssessment('triage')" id="btn-triage">
      <span class="mode-btn-label">Option 1</span>
      <span class="mode-btn-title">Triage Assessment</span>
      <span class="mode-btn-desc">Six essential questions that identify your most critical exposure areas and immediate priorities. Designed for executives who need a rapid picture of risk.</span>
      <span class="mode-btn-time">⏱ Approx. 3–4 minutes</span>
    </button>
    <button class="mode-btn" onclick="startAssessment('full')" id="btn-full">
      <span class="mode-btn-label">Option 2</span>
      <span class="mode-btn-title">Full Assessment</span>
      <span class="mode-btn-desc">A comprehensive evaluation across all high-risk AI obligation domains — documentation, logging, oversight, bias, transparency, and data governance. Produces a detailed readiness report.</span>
      <span class="mode-btn-time">⏱ Approx. 12–15 minutes</span>
    </button>
  </div>

  <!-- ══ TRIAGE ASSESSMENT ══ -->
  <div class="assessment-wrap" id="triage-wrap">
    <div class="progress-label" id="triage-progress-label">Question 1 of 6</div>
    <div class="progress-bar"><div class="progress-fill" id="triage-progress" style="width:16%;"></div></div>
    <div id="triage-questions"></div>
    <div class="q-nav">
      <button class="btn-prev" id="triage-prev" onclick="triagePrev()" style="display:none;">← Previous</button>
      <button class="btn-next" id="triage-next" onclick="triageNext()">Next →</button>
    </div>
    <div class="results-block" id="triage-results"></div>
  </div>

  <!-- ══ FULL ASSESSMENT ══ -->
  <div class="assessment-wrap" id="full-wrap">
    <div class="progress-label" id="full-progress-label">Question 1 of 20</div>
    <div class="progress-bar"><div class="progress-fill" id="full-progress" style="width:5%;"></div></div>
    <div id="full-questions"></div>
    <div class="q-nav">
      <button class="btn-prev" id="full-prev" onclick="fullPrev()" style="display:none;">← Previous</button>
      <button class="btn-next" id="full-next" onclick="fullNext()">Next →</button>
    </div>
    <div class="results-block" id="full-results"></div>
  </div>

</main>

<script>
// ══════════════════════════════════════════════
//  TRIAGE QUESTIONS (6)
// ══════════════════════════════════════════════
const triageQs = [
  {
    section: "AI System Inventory",
    text: "Does your organisation use AI systems to support, influence, or make decisions about hiring, promotion, termination, or workforce management?",
    sub: "Include any tools that screen CVs, rank candidates, assess competencies, predict performance, or flag employees.",
    options: [
      { text: "Yes — AI is actively used in one or more of these areas", sub: "", score: 3 },
      { text: "Partially — AI assists but humans make all final decisions", sub: "", score: 2 },
      { text: "Under evaluation — we are piloting or planning to deploy", sub: "", score: 2 },
      { text: "No — we do not use AI in workforce decisions", sub: "", score: 0 }
    ]
  },
  {
    section: "Regulatory Exposure",
    text: "Does your organisation employ, recruit, or make workforce decisions affecting individuals located in the European Union?",
    sub: "The EU AI Act applies based on where AI output is used, not where your organisation is incorporated.",
    options: [
      { text: "Yes — we operate across EU member states", sub: "", score: 3 },
      { text: "Yes — we recruit from EU-based candidate pools", sub: "", score: 3 },
      { text: "Potentially — we have EU-adjacent operations or partners", sub: "", score: 2 },
      { text: "No — our operations and workforce are entirely outside the EU", sub: "", score: 0 }
    ]
  },
  {
    section: "Audit Trail Capability",
    text: "If a regulator or court requested evidence of how a specific AI-assisted hiring decision was made six months ago, what could your organisation produce?",
    sub: "Be candid — this is the question regulators will ask.",
    options: [
      { text: "A cryptographically signed, tamper-evident execution record with full context", sub: "Full proof capability", score: 0 },
      { text: "Detailed system logs with timestamps and decision rationale", sub: "Strong but not cryptographically sealed", score: 1 },
      { text: "Basic logs showing an outcome was recorded", sub: "Exists but limited evidentiary value", score: 2 },
      { text: "We would struggle to reconstruct the specific decision", sub: "Significant exposure", score: 3 }
    ]
  },
  {
    section: "Human Oversight",
    text: "Can your designated AI oversight personnel currently intervene in, modify, or override AI decisions in your high-risk workflows — and can you demonstrate that capability to regulators?",
    sub: "The EU AI Act requires genuine oversight capacity, not nominal oversight.",
    options: [
      { text: "Yes — with documented procedures and training records", sub: "", score: 0 },
      { text: "Yes — oversight exists but documentation is incomplete", sub: "", score: 1 },
      { text: "Partially — oversight exists in theory but is not systematically practised", sub: "", score: 2 },
      { text: "No — or we have not assessed this requirement", sub: "", score: 3 }
    ]
  },
  {
    section: "Prohibited Practices",
    text: "Has your organisation audited its AI systems to confirm that prohibited practices — emotion recognition in hiring, biometric trait inference, social scoring — have ceased as of February 2025?",
    sub: "These prohibitions are in force now. Non-compliance is already a violation.",
    options: [
      { text: "Yes — formal audit completed with documented confirmation", sub: "", score: 0 },
      { text: "Yes — informally confirmed but not formally documented", sub: "", score: 1 },
      { text: "In progress — audit is underway", sub: "", score: 2 },
      { text: "Not yet — this has not been formally assessed", sub: "", score: 3 }
    ]
  },
  {
    section: "Timeline Awareness",
    text: "How would you characterise your organisation's current readiness for the August 2026 full high-risk AI obligations deadline?",
    sub: "Be candid — underestimating this timeline is the most common compliance risk.",
    options: [
      { text: "Prepared — programme is in place and tracking well", sub: "", score: 0 },
      { text: "In progress — meaningful work underway but gaps remain", sub: "", score: 1 },
      { text: "Early stages — we have begun but have significant work ahead", sub: "", score: 2 },
      { text: "Not started — we have not yet launched a compliance programme", sub: "", score: 3 }
    ]
  }
];

// ══════════════════════════════════════════════
//  FULL ASSESSMENT QUESTIONS (20)
// ══════════════════════════════════════════════
const fullQs = [
  // SECTION A: Inventory & Classification
  {
    section: "A · System Inventory",
    text: "Have you completed a formal inventory of all AI systems used in employment-related decisions?",
    sub: "Include screening, scheduling, assessment, performance management, and workforce planning tools.",
    options: [
      { text: "Yes — comprehensive, maintained inventory with risk classifications", score: 0 },
      { text: "Yes — inventory exists but risk classifications are incomplete", score: 1 },
      { text: "Partial — some systems documented, others not", score: 2 },
      { text: "No formal inventory exists", score: 3 }
    ]
  },
  {
    section: "A · System Inventory",
    text: "Have all AI systems in scope been formally classified against the EU AI Act's risk tiers, with particular attention to Annex III high-risk designations?",
    sub: "Annex III explicitly designates employment, workforce management, and access to self-employment as high-risk domains.",
    options: [
      { text: "Yes — formal classification with legal review completed", score: 0 },
      { text: "Yes — classification completed internally without external legal review", score: 1 },
      { text: "In progress — classification underway", score: 2 },
      { text: "Not completed", score: 3 }
    ]
  },
  // SECTION B: Documentation
  {
    section: "B · Technical Documentation",
    text: "Do your high-risk AI systems have technical documentation that satisfies EU AI Act requirements — covering design, training data, intended purpose, limitations, and accuracy metrics?",
    sub: "This documentation must be continuously maintained, not a one-time submission.",
    options: [
      { text: "Yes — comprehensive, current documentation maintained for all in-scope systems", score: 0 },
      { text: "Partial — documentation exists but is incomplete or outdated", score: 1 },
      { text: "Minimal — basic vendor documentation only", score: 2 },
      { text: "Not in place", score: 3 }
    ]
  },
  {
    section: "B · Technical Documentation",
    text: "Can you produce AI system documentation on demand in response to a regulatory request within a commercially reasonable timeframe?",
    sub: "Regulators expect prompt production. The inability to produce documentation promptly may itself be treated as a compliance failure.",
    options: [
      { text: "Yes — documented process and designated custodian in place", score: 0 },
      { text: "Likely — documentation exists but retrieval process is informal", score: 1 },
      { text: "Uncertain — documentation is fragmented across vendors and systems", score: 2 },
      { text: "No — this capability does not currently exist", score: 3 }
    ]
  },
  // SECTION C: Logging & Proof
  {
    section: "C · Execution Logging",
    text: "Do your AI systems automatically log events relevant to identifying risks throughout their operational lifecycle?",
    sub: "The Act mandates automatic logging — not retrospective reconstruction.",
    options: [
      { text: "Yes — automatic logging with tamper-evident records", score: 0 },
      { text: "Yes — automatic logging but records are not tamper-evident", score: 1 },
      { text: "Partial — some events logged, others not", score: 2 },
      { text: "No automatic logging in place", score: 3 }
    ]
  },
  {
    section: "C · Execution Logging",
    text: "Are your AI decision logs cryptographically sealed and timestamped with a trusted, hardware-attested time source?",
    sub: "Server clocks can be manipulated. Regulators increasingly expect independently verifiable timestamps.",
    options: [
      { text: "Yes — cryptographic sealing and hardware-attested timestamps in place", score: 0 },
      { text: "Partial — logs exist with standard timestamps but no cryptographic sealing", score: 2 },
      { text: "No — standard server logs only", score: 3 },
      { text: "Not assessed", score: 3 }
    ]
  },
  {
    section: "C · Execution Logging",
    text: "Can you produce, for a specific historical AI hiring decision, the exact rules in force at the moment of that decision — including any constraints or delegated authority under which the system operated?",
    sub: "This is the question regulators and opposing counsel will ask.",
    options: [
      { text: "Yes — execution context is captured and retrievable at the decision level", score: 0 },
      { text: "Partially — outcome is logged but governing rules are not captured at execution time", score: 2 },
      { text: "No — we cannot reconstruct the governing context for specific decisions", score: 3 },
      { text: "Not assessed", score: 3 }
    ]
  },
  // SECTION D: Human Oversight
  {
    section: "D · Human Oversight",
    text: "Have individuals responsible for AI oversight been formally identified, with documented roles, responsibilities, and appropriate technical training?",
    sub: "The Act requires that oversight personnel understand the systems they supervise.",
    options: [
      { text: "Yes — formal designation with training records and regular review", score: 0 },
      { text: "Yes — designated but training is informal or incomplete", score: 1 },
      { text: "Partially — oversight roles exist but are not formally documented", score: 2 },
      { text: "No formal oversight designation", score: 3 }
    ]
  },
  {
    section: "D · Human Oversight",
    text: "Can designated oversight personnel currently intervene in, modify, or halt AI system operations in high-risk workflows — with documented evidence of that capability?",
    sub: "The Act requires genuine, exercisable oversight — not nominal oversight.",
    options: [
      { text: "Yes — intervention capability documented and tested", score: 0 },
      { text: "Yes — capability exists but has not been formally tested or documented", score: 1 },
      { text: "Partial — intervention is possible but not systematically structured", score: 2 },
      { text: "No — or this has not been assessed", score: 3 }
    ]
  },
  // SECTION E: Bias & Data Governance
  {
    section: "E · Bias & Data Governance",
    text: "Have your AI training datasets been assessed for representativeness, relevance, and freedom from historical bias — with documentation of those assessments?",
    sub: "This applies both to datasets you control and to third-party vendor datasets.",
    options: [
      { text: "Yes — formal bias assessments completed and documented within the past 12 months", score: 0 },
      { text: "Yes — assessments completed but not within the past 12 months", score: 1 },
      { text: "Partial — some datasets assessed, others not", score: 2 },
      { text: "No formal bias assessment has been conducted", score: 3 }
    ]
  },
  {
    section: "E · Bias & Data Governance",
    text: "Is ongoing bias monitoring in place for AI systems actively used in hiring decisions — with documented results?",
    sub: "One-time assessment at deployment is insufficient. The Act requires continuous monitoring.",
    options: [
      { text: "Yes — continuous monitoring with documented reporting cadence", score: 0 },
      { text: "Periodic monitoring — conducted at intervals but not continuously", score: 1 },
      { text: "Minimal — monitoring is ad hoc or reactive", score: 2 },
      { text: "No ongoing monitoring in place", score: 3 }
    ]
  },
  // SECTION F: Transparency
  {
    section: "F · Transparency",
    text: "Have employee representative bodies been informed and consulted prior to deploying high-risk AI systems, as required by Article 26(7)?",
    sub: "This obligation is already in force. It is not subject to the August 2026 timeline.",
    options: [
      { text: "Yes — consultation completed and documented for all in-scope deployments", score: 0 },
      { text: "Yes — consultation occurred informally or incompletely", score: 1 },
      { text: "In progress", score: 2 },
      { text: "No — this obligation has not been addressed", score: 3 }
    ]
  },
  {
    section: "F · Transparency",
    text: "Are candidates and employees informed when AI systems are used in decisions that affect them, with clear explanation of the AI's role?",
    sub: "Transparency to data subjects is a combined requirement of the EU AI Act and GDPR.",
    options: [
      { text: "Yes — formal disclosure process in place for all AI-assisted decisions", score: 0 },
      { text: "Partial — some disclosures made but not systematically", score: 1 },
      { text: "Minimal — disclosure is buried in general privacy policies", score: 2 },
      { text: "No — candidates and employees are not specifically informed", score: 3 }
    ]
  },
  // SECTION G: Vendor Management
  {
    section: "G · Vendor Management",
    text: "Have you engaged your AI vendors directly on EU AI Act readiness — including CE marking status, bias audit documentation, and execution proof capability?",
    sub: "Deployers share compliance responsibility with providers. Vendor non-compliance does not shield deployers from liability.",
    options: [
      { text: "Yes — formal vendor assessment completed with documented responses", score: 0 },
      { text: "Partial — informal conversations underway but not documented", score: 1 },
      { text: "Minimal — vendor AI Act readiness has not been formally assessed", score: 2 },
      { text: "No — vendor compliance has not been addressed", score: 3 }
    ]
  },
  {
    section: "G · Vendor Management",
    text: "Do your AI vendor contracts currently contain EU AI Act compliance warranties, audit rights, and indemnification provisions?",
    sub: "Existing contracts signed before 2024 are unlikely to contain these provisions.",
    options: [
      { text: "Yes — contracts updated to include AI Act-specific provisions", score: 0 },
      { text: "In progress — contract updates underway", score: 1 },
      { text: "Not yet — existing contracts are being reviewed", score: 2 },
      { text: "No — contracts have not been reviewed for AI Act provisions", score: 3 }
    ]
  },
  // SECTION H: Prohibited Practices
  {
    section: "H · Prohibited Practices",
    text: "Has your organisation formally confirmed that prohibited AI practices — emotion recognition in hiring contexts, biometric trait inference, predictive social scoring — have ceased as of February 2025?",
    sub: "These are already violations. There is no grace period.",
    options: [
      { text: "Yes — formal audit completed with legal sign-off", score: 0 },
      { text: "Yes — internally confirmed but not formally documented", score: 1 },
      { text: "In progress — audit underway", score: 2 },
      { text: "Not completed — this has not been formally assessed", score: 3 }
    ]
  },
  // SECTION I: Programme Readiness
  {
    section: "I · Programme Readiness",
    text: "Does your organisation have a designated AI compliance programme with executive sponsorship, defined milestones, and a documented path to August 2026 readiness?",
    sub: "",
    options: [
      { text: "Yes — formal programme with board-level visibility and tracking", score: 0 },
      { text: "Yes — programme exists but lacks formal executive sponsorship", score: 1 },
      { text: "Early stage — programme is being scoped", score: 2 },
      { text: "No formal programme in place", score: 3 }
    ]
  },
  {
    section: "I · Programme Readiness",
    text: "Has your organisation engaged external legal counsel with EU AI Act expertise to validate your compliance approach?",
    sub: "",
    options: [
      { text: "Yes — external AI law expertise engaged and actively involved", score: 0 },
      { text: "Partial — general data protection counsel advising without specific AI Act expertise", score: 1 },
      { text: "Not yet — planning to engage", score: 2 },
      { text: "No external legal support", score: 3 }
    ]
  },
  {
    section: "I · Programme Readiness",
    text: "Have you performed AI impact assessments before adopting new AI tools in employment-related contexts?",
    sub: "Pre-deployment assessment is a requirement, not a recommendation.",
    options: [
      { text: "Yes — formal AI impact assessment process in place for all new deployments", score: 0 },
      { text: "Partial — assessments conducted for some deployments", score: 1 },
      { text: "Minimal — informal review only", score: 2 },
      { text: "No formal impact assessment process", score: 3 }
    ]
  },
  {
    section: "I · Programme Readiness",
    text: "Overall, how would you characterise your organisation's confidence in its ability to demonstrate full EU AI Act compliance for high-risk AI systems by August 2026?",
    sub: "",
    options: [
      { text: "High confidence — we are on track and have clear evidence of readiness", score: 0 },
      { text: "Moderate confidence — meaningful progress but gaps remain", score: 1 },
      { text: "Low confidence — significant work required in a compressed timeframe", score: 2 },
      { text: "Very low — we are not on a path to compliance by August 2026", score: 3 }
    ]
  }
];

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let triageIdx = 0, triageAnswers = [], triageMode = false;
let fullIdx   = 0, fullAnswers   = [], fullMode   = false;

function startAssessment(mode) {
  document.getElementById('mode-selector').style.display = 'none';
  if (mode === 'triage') {
    triageMode = true;
    document.getElementById('triage-wrap').classList.add('active');
    renderTriage();
  } else {
    fullMode = true;
    document.getElementById('full-wrap').classList.add('active');
    renderFull();
  }
}

// ══ TRIAGE ══
function renderTriage() {
  const q = triageQs[triageIdx];
  const total = triageQs.length;
  document.getElementById('triage-progress-label').textContent = `Question ${triageIdx+1} of ${total}`;
  document.getElementById('triage-progress').style.width = `${((triageIdx+1)/total)*100}%`;

  const selected = triageAnswers[triageIdx];
  let html = `<div class="question-block active">
    <p class="q-section">${q.section}</p>
    <p class="q-text">${q.text}</p>
    ${q.sub ? `<p class="q-sub">${q.sub}</p>` : ''}
    <div class="q-options">`;
  q.options.forEach((o,i) => {
    const sel = selected === i ? 'selected' : '';
    html += `<div class="q-option ${sel}" onclick="selectTriage(${i})">
      <div class="q-radio"></div>
      <div>
        <div class="q-option-text">${o.text}</div>
        ${o.sub ? `<div class="q-option-sub">${o.sub}</div>` : ''}
      </div>
    </div>`;
  });
  html += `</div></div>`;
  document.getElementById('triage-questions').innerHTML = html;
  document.getElementById('triage-prev').style.display = triageIdx > 0 ? 'block' : 'none';
  document.getElementById('triage-next').textContent = triageIdx === total-1 ? 'See Results' : 'Next →';
  document.getElementById('triage-next').disabled = selected === undefined;
}

function selectTriage(i) {
  triageAnswers[triageIdx] = i;
  renderTriage();
}

function triageNext() {
  if (triageAnswers[triageIdx] === undefined) return;
  if (triageIdx < triageQs.length - 1) { triageIdx++; renderTriage(); }
  else { showTriageResults(); }
}

function triagePrev() {
  if (triageIdx > 0) { triageIdx--; renderTriage(); }
}

function showTriageResults() {
  document.getElementById('triage-questions').style.display = 'none';
  document.getElementById('triage-progress').closest('.progress-bar').style.width = '100%';
  document.querySelector('#triage-wrap .q-nav').style.display = 'none';

  let score = 0;
  triageAnswers.forEach((a,i) => { score += triageQs[i].options[a].score; });
  const max = triageQs.length * 3;
  const pct = Math.round((1 - score/max) * 100);

  let tier, tierColor, summary, findings;
  if (pct >= 75) {
    tier = 'Strong Foundation'; tierColor = '#4CAF50';
    summary = 'Your organisation demonstrates solid foundational awareness of AI governance requirements. Key processes appear to be in place. The full assessment will help identify specific gaps before the August 2026 deadline.';
  } else if (pct >= 50) {
    tier = 'Moderate Exposure'; tierColor = '#C9A96E';
    summary = 'Your organisation has begun addressing AI governance obligations but meaningful gaps remain. The August 2026 high-risk deadline represents a material compliance risk that requires focused programme investment now.';
  } else if (pct >= 25) {
    tier = 'Significant Exposure'; tierColor = '#CC3562';
    summary = 'Your organisation faces significant compliance exposure. Multiple foundational requirements are not yet in place. Given the August 2026 deadline, the time for a comprehensive programme is now — not later.';
  } else {
    tier = 'Critical Exposure'; tierColor = '#8B1030';
    summary = 'Your organisation has critical AI governance gaps. Some prohibited practices may already represent active violations. Immediate engagement with legal counsel and infrastructure partners is strongly advised.';
  }

  findings = buildTriageFindings(triageAnswers);

  const html = `
    <div class="result-score-wrap">
      <div class="result-score" style="color:${tierColor};">${pct}%</div>
      <div class="result-tier" style="color:${tierColor}; letter-spacing:0.4em;">${tier}</div>
      <p class="result-summary">${summary}</p>
    </div>
    <div class="result-findings">${findings}</div>
    <div class="result-actions">
      <a href="index.html" class="btn-home">← Return to Home</a>
      <button class="btn-next" onclick="restartTriage()">Retake Assessment</button>
      <button class="btn-next" style="background:linear-gradient(135deg,#6A3000,#C9A96E);" onclick="document.getElementById('mode-selector').style.display='grid';document.getElementById('triage-wrap').classList.remove('active');triageIdx=0;triageAnswers=[];triageMode=false;">Take Full Assessment</button>
      <a href="mailto:helen@selfient.com?subject=ROSÉ Compliance Assessment - Briefing Request" class="btn-next" style="text-decoration:none;">Request Briefing →</a>
    </div>`;

  const r = document.getElementById('triage-results');
  r.innerHTML = html;
  r.classList.add('active');
}

function buildTriageFindings(answers) {
  const flags = [
    { q: 0, threshold: 1, icon: '⚠', title: 'AI in High-Risk Workflows', text: 'Your organisation deploys AI in employment decisions — the highest-risk category under the EU AI Act.' },
    { q: 1, threshold: 1, icon: '⚠', title: 'EU Regulatory Jurisdiction Applies', text: 'Your organisation is subject to EU AI Act obligations based on where AI outputs affect individuals.' },
    { q: 2, threshold: 2, icon: '◈', title: 'Execution Proof Gap', text: 'Your current logging capability may not satisfy the evidentiary standard regulators and courts will require.' },
    { q: 3, threshold: 2, icon: '◈', title: 'Human Oversight Documentation', text: 'Oversight capability exists but requires stronger documentation to satisfy regulatory scrutiny.' },
    { q: 4, threshold: 2, icon: '⚠', title: 'Prohibited Practices Audit Required', text: 'Confirmation that prohibited AI practices have ceased is not yet formally documented — this is an active compliance obligation.' },
    { q: 5, threshold: 2, icon: '◈', title: 'Programme Urgency', text: 'Your compliance programme requires acceleration to meet the August 2026 deadline with confidence.' }
  ];
  let html = '';
  flags.forEach(f => {
    const score = triageQs[f.q].options[answers[f.q]].score;
    if (score >= f.threshold) {
      html += `<div class="finding">
        <span class="finding-icon" style="color:var(--rose)">${f.icon}</span>
        <div><h4>${f.title}</h4><p>${f.text}</p></div>
      </div>`;
    }
  });
  if (!html) html = `<div class="finding"><span class="finding-icon" style="color:#4CAF50">✦</span><div><h4>Strong Posture Detected</h4><p>Your triage responses indicate a well-managed AI governance programme. We recommend the full assessment to confirm depth across all obligation areas.</p></div></div>`;
  return html;
}

function restartTriage() {
  triageIdx = 0; triageAnswers = [];
  document.getElementById('triage-questions').style.display = 'block';
  document.querySelector('#triage-wrap .q-nav').style.display = 'flex';
  document.getElementById('triage-results').classList.remove('active');
  document.getElementById('triage-results').innerHTML = '';
  document.getElementById('triage-progress').closest('.progress-bar').style.width = '';
  renderTriage();
}

// ══ FULL ══
function renderFull() {
  const q = fullQs[fullIdx];
  const total = fullQs.length;
  document.getElementById('full-progress-label').textContent = `Question ${fullIdx+1} of ${total}`;
  document.getElementById('full-progress').style.width = `${((fullIdx+1)/total)*100}%`;

  const selected = fullAnswers[fullIdx];
  let html = `<div class="question-block active">
    <p class="q-section">${q.section}</p>
    <p class="q-text">${q.text}</p>
    ${q.sub ? `<p class="q-sub">${q.sub}</p>` : ''}
    <div class="q-options">`;
  q.options.forEach((o,i) => {
    const sel = selected === i ? 'selected' : '';
    html += `<div class="q-option ${sel}" onclick="selectFull(${i})">
      <div class="q-radio"></div>
      <div>
        <div class="q-option-text">${o.text}</div>
        ${o.sub ? `<div class="q-option-sub">${o.sub}</div>` : ''}
      </div>
    </div>`;
  });
  html += `</div></div>`;
  document.getElementById('full-questions').innerHTML = html;
  document.getElementById('full-prev').style.display = fullIdx > 0 ? 'block' : 'none';
  document.getElementById('full-next').textContent = fullIdx === total-1 ? 'See Full Report' : 'Next →';
  document.getElementById('full-next').disabled = selected === undefined;
}

function selectFull(i) {
  fullAnswers[fullIdx] = i;
  renderFull();
}

function fullNext() {
  if (fullAnswers[fullIdx] === undefined) return;
  if (fullIdx < fullQs.length - 1) { fullIdx++; renderFull(); }
  else { showFullResults(); }
}

function fullPrev() {
  if (fullIdx > 0) { fullIdx--; renderFull(); }
}

function showFullResults() {
  document.getElementById('full-questions').style.display = 'none';
  document.querySelector('#full-wrap .q-nav').style.display = 'none';

  let total = 0;
  const sectionScores = {};
  fullAnswers.forEach((a,i) => {
    const score = fullQs[i].options[a].score;
    total += score;
    const sec = fullQs[i].section.split('·')[0].trim();
    if (!sectionScores[sec]) sectionScores[sec] = { score:0, max:0 };
    sectionScores[sec].score += score;
    sectionScores[sec].max += 3;
  });

  const max = fullQs.length * 3;
  const pct = Math.round((1 - total/max) * 100);

  let tier, tierColor, summary;
  if (pct >= 80) {
    tier = 'Advanced Readiness'; tierColor = '#4CAF50';
    summary = 'Your organisation demonstrates advanced AI governance readiness. The detailed findings below highlight areas for optimisation as you approach and maintain August 2026 compliance.';
  } else if (pct >= 60) {
    tier = 'Developing Programme'; tierColor = '#C9A96E';
    summary = 'Your programme has meaningful foundations but requires focused investment to reach full compliance by August 2026. Priority areas are identified below.';
  } else if (pct >= 35) {
    tier = 'Material Compliance Risk'; tierColor = '#CC3562';
    summary = 'Your organisation carries material compliance risk across multiple obligation domains. A structured remediation programme with clear milestones is urgently required.';
  } else {
    tier = 'Critical Programme Gap'; tierColor = '#8B1030';
    summary = 'Critical gaps exist across foundational compliance requirements. Some prohibited practice obligations are already in force. Immediate executive escalation and legal engagement is advised.';
  }

  let domainRows = '';
  const sectionLabels = { A:'System Inventory', B:'Technical Documentation', C:'Execution & Logging', D:'Human Oversight', E:'Bias & Data Governance', F:'Transparency', G:'Vendor Management', H:'Prohibited Practices', I:'Programme Readiness' };
  Object.entries(sectionScores).forEach(([k, v]) => {
    const spct = Math.round((1 - v.score/v.max)*100);
    const color = spct >= 75 ? '#4CAF50' : spct >= 50 ? '#C9A96E' : '#CC3562';
    const label = sectionLabels[k] || k;
    domainRows += `<div style="display:flex;align-items:center;gap:1.2rem;padding:0.9rem 0;border-bottom:1px solid var(--border);">
      <span style="font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.3em;color:var(--gold);min-width:160px;">${label}</span>
      <div style="flex:1;height:4px;background:var(--border);border-radius:2px;">
        <div style="width:${spct}%;height:100%;background:${color};border-radius:2px;transition:width 0.5s;"></div>
      </div>
      <span style="font-size:0.8rem;color:${color};min-width:36px;text-align:right;">${spct}%</span>
    </div>`;
  });

  const html = `
    <div class="result-score-wrap">
      <div class="result-score" style="color:${tierColor};">${pct}%</div>
      <div class="result-tier" style="color:${tierColor};letter-spacing:0.4em;">${tier}</div>
      <p class="result-summary">${summary}</p>
    </div>
    <div style="border:1px solid var(--border);padding:2rem;margin-bottom:2rem;">
      <p style="font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.4em;color:var(--gold);text-transform:uppercase;margin-bottom:1.5rem;">Readiness by Obligation Domain</p>
      ${domainRows}
    </div>
    <div class="result-findings">
      <p style="font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.4em;color:var(--gold);text-transform:uppercase;margin-bottom:1.5rem;">Priority Recommendations</p>
      ${buildFullFindings()}
    </div>
    <div class="result-actions">
      <a href="index.html" class="btn-home">← Return to Home</a>
      <button class="btn-next" onclick="restartFull()">Retake Assessment</button>
      <a href="mailto:helen@selfient.com?subject=ROSÉ Full Assessment - Briefing Request&body=My overall readiness score was ${pct}% (${tier}). I would like to discuss ROSÉ's compliance infrastructure." class="btn-next" style="text-decoration:none;">Discuss with ROSÉ →</a>
    </div>`;

  const r = document.getElementById('full-results');
  r.innerHTML = html;
  r.classList.add('active');
}

function buildFullFindings() {
  const criticals = [];
  fullAnswers.forEach((a,i) => {
    const score = fullQs[i].options[a].score;
    if (score >= 2) criticals.push({ q: fullQs[i], score });
  });

  if (!criticals.length) return `<div class="finding"><span class="finding-icon" style="color:#4CAF50">✦</span><div><h4>No Critical Gaps Identified</h4><p>Your assessment responses indicate a well-structured compliance programme. Focus on maintaining documentation currency and monitoring regulatory developments.</p></div></div>`;

  return criticals.slice(0,5).map(c => `
    <div class="finding">
      <span class="finding-icon" style="color:var(--rose)">◈</span>
      <div>
        <h4>${c.q.section.split('·')[1]?.trim() || c.q.section} — Action Required</h4>
        <p>${c.q.text}</p>
      </div>
    </div>`).join('');
}

function restartFull() {
  fullIdx = 0; fullAnswers = [];
  document.getElementById('full-questions').style.display = 'block';
  document.querySelector('#full-wrap .q-nav').style.display = 'flex';
  document.getElementById('full-results').classList.remove('active');
  document.getElementById('full-results').innerHTML = '';
  renderFull();
}
</script>
</body>
</html>
